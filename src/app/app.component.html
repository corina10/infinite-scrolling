<div class="page">
  <header class="page__header">
    <h1 class="page__title">Infinite Scroll — Virtual Scrolling PoC</h1>
    <p class="page__subtitle">
      CDK virtual scroll + paginated backend mock &mdash; only visible items exist in the DOM
    </p>
  </header>

  <div class="viewer">
    <app-scroll-stats [totalFetched]="totalFetched" [totalInMemory]="totalInMemory" [totalInDom]="totalInDom"
      [firstVisibleIndex]="firstVisibleIndex" [isLoading]="isLoading" />

    @if (isLoading) {
    <div class="loading-row">
      <span class="loading-row__spinner"></span>
      Loading older messages…
    </div>
    }

    <cdk-virtual-scroll-viewport class="viewport" autosize minBufferPx="400" maxBufferPx="800">
      <app-comment-card *cdkVirtualFor="let comment of provider.comments$; trackBy: trackById" [comment]="comment" />
    </cdk-virtual-scroll-viewport>
  </div>
</div>
